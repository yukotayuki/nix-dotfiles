# ctrl+[ を ESC として送信する。
# Ghostty はデフォルトで ctrl+[ を fixterms エンコーディング（CSI 91;5u）として
# 送信するため、zsh vi モードや neovim で ESC として認識されない。
keybind = ctrl+left_bracket=esc:

# iTerm2 の Hotkey Window と同じ使用感で quick-terminal を呼び出す。
keybind = global:ctrl+enter=toggle_quick_terminal

# super+shift+o で透明度をトグルする（設定値 0.7 ↔ 1.0）。
# super キーは macOS アプリ層で捕捉されるため fzf 等の端末内バインドと競合しない。
keybind = super+shift+o=toggle_background_opacity
