name: CI

on:
  pull_request:
  # nixpkgs の更新で設定が壊れていないかを定期検知するため週次で実行する。
  # PR チェックと組み合わせることで、push 時の不要なビルドを省いている。
  schedule:
    - cron: "0 0 * * 0"

jobs:
  build:
    name: hm-ubuntu ビルド検証
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Nix をインストール
        uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d # v16

      - name: Nix キャッシュを有効化
        uses: DeterminateSystems/magic-nix-cache-action@6221693898146dc97e38ad0e013488a16477a4c4 # v9

      - name: hm-ubuntu をビルド
        run: nix build .#homeConfigurations.hm-ubuntu.activationPackage --no-link
