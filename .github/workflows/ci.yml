name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  # nixpkgs の更新で設定が壊れていないかを定期検知するため週次で実行する。
  # push だけでは nixpkgs 起因の破壊に気づくのが遅れるため。
  schedule:
    - cron: "0 0 * * 0"

jobs:
  build:
    name: hm-ubuntu ビルド検証
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Nix をインストール
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Nix キャッシュを有効化
        uses: DeterminateSystems/magic-nix-cache-action@v9

      - name: hm-ubuntu をビルド
        run: nix build .#homeConfigurations.hm-ubuntu.activationPackage --no-link
