name: Weekly flake update

on:
  schedule:
    # 毎週月曜 09:00 JST（00:00 UTC）に実行
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  update:
    name: nix flake update & PR 作成
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Nix をインストール
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Nix キャッシュを有効化
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: nix flake update
        run: nix flake update

      - name: PR を作成
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "chore(nix): nix flake update"
          title: "chore(nix): 週次 nix flake update"
          body: |
            週次スケジュールによる自動 `nix flake update`。

            変更があった場合のみこの PR が作成されます。
            CI が通ったことを確認してからマージしてください。
          branch: chore/flake-update
          delete-branch: true
          labels: dependencies
