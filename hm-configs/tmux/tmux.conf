# prefix
unbind C-b
set -g prefix C-g

# terminal
# tmux-256color を使わない理由:
#   screen-256color より true color サポートが広く、Ghostty との組み合わせで
#   正確な色再現ができる。
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# general
set -g escape-time 0
set -g mouse on
set -g history-limit 100000
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

# vi mode
set -g mode-keys vi

# clipboard (macOS)
# reattach-to-user-namespace を使わない理由:
#   tmux 2.6 以降は copy-command で pbcopy を直接呼べるため不要。
set -s copy-command 'pbcopy'
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel

# pane navigation (vim-like)
bind h select-pane -L
bind C-h select-pane -L
bind j select-pane -D
bind C-j select-pane -D
bind k select-pane -U
bind C-k select-pane -U
bind l select-pane -R
bind C-l select-pane -R

bind -n S-Left select-pane -L
bind -n S-Down select-pane -D
bind -n S-Up select-pane -U
bind -n S-Right select-pane -R

# splits
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# resize
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5

# synchronize panes
bind b set-window-option synchronize-panes on
bind B set-window-option synchronize-panes off

# status bar
# window-status-format / status-right は nord テーマに任せる。
# status-position top のみ上書きする（nord のデフォルトは bottom）。
set -g status on
set -g status-position top

set -g default-shell "/bin/zsh"
set -g default-command "/bin/zsh"
